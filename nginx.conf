server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Seserverve the SPA, fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # cache static assets aggressively; Vite fingerprints them by content hash
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ignore root html cache so the browser always picks up new assets hashes
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
