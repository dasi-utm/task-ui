services:
  task-ui:
    build:
      context: ..
      target: deps
    command: npm run dev -- --host
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:3001/api/v1
      VITE_SIGNALR_URL: http://localhost:3001/hubs/tasks
    volumes:
      - ..:/app
      - /app/node_modules
    restart: unless-stopped
    networks:
      - taskflow-net

networks:
  taskflow-net:
    external: true
